name: php-lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
      - name: Lint PHP files
        run: |
          set -e
          find . -name "*.php" -print0 | xargs -0 -n 1 php -l
