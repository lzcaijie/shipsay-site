<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>404 - 页面不存在</title>
  <style>
    body{background:#111;font-size:14px;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;color:#eee;}
    .wrap{max-width:720px;margin:0 auto;padding:64px 16px;text-align:center;}
    h1{font-size:72px;margin:0 0 12px;font-weight:700;letter-spacing:2px;}
    p{margin:8px 0 0;color:#bbb;line-height:1.6}
    .actions{margin-top:24px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
    .btn{display:inline-block;padding:10px 16px;border-radius:8px;text-decoration:none;border:1px solid rgba(255,255,255,.18);color:#eee;background:rgba(255,255,255,.06)}
    .btn:hover{background:rgba(255,255,255,.10)}
    .search{margin-top:18px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
    .search input{width:min(420px,78vw);padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.35);color:#fff;outline:none}
    .search button{padding:10px 16px;border-radius:8px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.10);color:#fff;cursor:pointer}
    .search button:hover{background:rgba(255,255,255,.16)}
    .tip{margin-top:14px;font-size:12px;color:#888}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <p>您访问的页面不存在，可能已被删除或链接已失效。</p>

    <form class="search" action="/search/" method="get">
      <input type="text" name="searchkey" placeholder="搜索书名 / 作者" autocomplete="off" />
      <button type="submit">搜 索</button>
    </form>

    <div class="actions">
      <a class="btn" href="/">返回首页</a>
      <a class="btn" href="javascript:history.back();">返回上一页</a>
    </div>

  </div>
</body>
</html>
